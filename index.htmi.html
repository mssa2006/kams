<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>النظام المالي</title>
<style>
body{font-family:Arial;background:#f5f7fb;padding:20px}
select{padding:10px;font-size:16px}
table{width:100%;border-collapse:collapse;margin-top:20px}
td,th{border:1px solid #ccc;padding:8px;text-align:center}
</style>
</head>
<body>

<h2>النظام المالي - عرض اليومية</h2>

<select id="monthSelect">
<option value="01">يناير</option>
<option value="02">فبراير</option>
<option value="03">مارس</option>
</select>

<table id="table">
<thead>
<tr>
<th>التاريخ</th>
<th>الإيرادات</th>
<th>المصروفات</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const DATA = {
"01":[
{date:"2026-01-01",income:182639,expense:20685},
{date:"2026-01-02",income:27870,expense:0}
],
"02":[
{date:"2026-02-01",income:204929,expense:352774}
],
"03":[
{date:"2026-03-01",income:127504,expense:13628}
]
};

function render(){
let m = document.getElementById("monthSelect").value;
let rows = DATA[m] || [];
let html="";
if(rows.length==0){
html="<tr><td colspan='3'>غير متوفر</td></tr>";
}else{
rows.forEach(r=>{
html+=`<tr><td>${r.date}</td><td>${r.income}</td><td>${r.expense}</td></tr>`;
});
}
document.querySelector("#table tbody").innerHTML=html;
}

document.getElementById("monthSelect").addEventListener("change",render);

// تشغيل تلقائي على يناير
document.getElementById("monthSelect").value="01";
render();
</script>

</body>
</html>
